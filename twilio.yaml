AWSTemplateFormatVersion: '2010-09-09'
Description: Deploy Flask webhook for Twilio on EC2

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair for SSH access

Resources:
  WebhookSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  WebhookInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      SecurityGroups:
        - !Ref WebhookSecurityGroup
      KeyName: !Ref KeyName
      ImageId: ami-0e449927258d45bc4 # Amazon Linux 2 AMI (region-specific, update if needed)
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y python3 git
          pip3 install flask twilio gunicorn

          mkdir -p /opt/webhook
          cat > /opt/webhook/app.py << 'EOF'
          from flask import Flask, request, Response
          from twilio.twiml.voice_response import VoiceResponse

          app = Flask(__name__)

          @app.route("/incoming-call", methods=["POST"])
          def incoming_call():
              response = VoiceResponse()
              response.connect().stream(url='wss://d2qcjspr6rc0rj.cloudfront.net/')
              return Response(str(response), mimetype="text/xml")

          if __name__ == "__main__":
              app.run(host="0.0.0.0", port=80)
          EOF

          cat > /etc/systemd/system/webhook.service << 'EOF'
          [Unit]
          Description=Flask Webhook App
          After=network.target

          [Service]
          ExecStart=/usr/bin/python3 /opt/webhook/app.py
          WorkingDirectory=/opt/webhook
          Restart=always
          User=root

          [Install]
          WantedBy=multi-user.target
          EOF

          systemctl daemon-reexec
          systemctl daemon-reload
          systemctl enable webhook
          systemctl start webhook

Outputs:
  InstancePublicIP:
    Description: Public IP of EC2 instance
    Value: !GetAtt WebhookInstance.PublicIp

  WebhookURL:
    Description: Public URL for the Twilio webhook
    Value: !Sub "http://${WebhookInstance.PublicDnsName}/incoming-call"
